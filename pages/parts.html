<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คลังอะไหล่ — Ao Nang Automotive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
.parts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.part-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all 0.15s;position:relative;overflow:hidden}
.part-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.part-card.critical::before{background:var(--red)}
.part-card.warning::before{background:var(--amber)}
.part-card.ok::before{background:var(--green)}
.part-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.pc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.pc-name{font-size:14px;font-weight:700;color:var(--text-900)}
.pc-cat{font-size:11px;color:var(--text-400);margin-top:2px}
.pc-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;white-space:nowrap}
.pc-badge.critical{background:var(--red-dim);color:#991b1b}
.pc-badge.warning{background:var(--amber-dim);color:#92400e}
.pc-badge.ok{background:var(--green-dim);color:#166534}
.pc-qty{display:flex;align-items:baseline;gap:6px;margin-bottom:10px}
.pc-qty-val{font-size:32px;font-weight:700;color:var(--text-900);line-height:1;font-family:var(--mono)}
.pc-qty-unit{font-size:13px;color:var(--text-500)}
.pc-qty-min{font-size:11px;color:var(--text-400);margin-left:auto;font-family:var(--mono)}
.pc-progress{height:5px;background:var(--bg-surface);border-radius:3px;margin-bottom:12px}
.pc-bar{height:100%;border-radius:3px}
.pc-bar.critical{background:var(--red)}
.pc-bar.warning{background:var(--amber)}
.pc-bar.ok{background:var(--green)}
.pc-footer{display:flex;gap:8px}
.pc-btn{flex:1;padding:8px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s;font-family:var(--font)}
.pc-btn-primary{background:var(--primary-dim);color:var(--primary);border:1px solid var(--primary-border)}
.pc-btn-primary:hover{background:var(--primary);color:#fff}
.pc-btn-ghost{background:none;border:1px solid var(--border);color:var(--text-500)}
.pc-btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.sum3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
</style>
</head>
<body>
<div class="app-shell" id="appShell"></div>
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header"><h2 class="modal-title">เพิ่มอะไหล่ใหม่</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>ชื่ออะไหล่ <span class="req">*</span></label><input type="text" id="p-name" placeholder="เช่น น้ำมันเครื่อง 10W-40"></div>
      <div class="form-row">
        <div class="form-group"><label>จำนวน <span class="req">*</span></label><input type="number" id="p-qty" placeholder="0"></div>
        <div class="form-group"><label>หน่วย</label><input type="text" id="p-unit" placeholder="ลิตร / ชิ้น / อัน"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>จำนวนขั้นต่ำ</label><input type="number" id="p-min" placeholder="5"></div>
        <div class="form-group"><label>หมวดหมู่</label><input type="text" id="p-cat" placeholder="เครื่องยนต์ / เบรค..."></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-primary" onclick="submitPart()">บันทึก</button>
    </div>
  </div>
</div>
<script src="../js/api.js"></script>
<script src="../js/shared.js"></script>
<script>
let PARTS=[
  {_id:'1',name:'น้ำมันเครื่อง 10W-40',category:'น้ำมัน',qty:2,minQty:10,unit:'ลิตร',status:'critical'},
  {_id:'2',name:'ผ้าเบรคหน้า Honda',category:'เบรค',qty:1,minQty:5,unit:'ชิ้น',status:'critical'},
  {_id:'3',name:'หัวเทียน NGK',category:'เครื่องยนต์',qty:8,minQty:10,unit:'อัน',status:'warning'},
  {_id:'4',name:'โซ่ 428H',category:'ส่งกำลัง',qty:15,minQty:5,unit:'เส้น',status:'ok'},
  {_id:'5',name:'ยาง Michelin',category:'ยาง',qty:4,minQty:2,unit:'เส้น',status:'ok'},
  {_id:'6',name:'ไส้กรองอากาศ',category:'กรอง',qty:6,minQty:3,unit:'ชิ้น',status:'ok'},
];
function getStatus(p){if(p.qty===0||p.qty<p.minQty*0.3)return'critical';if(p.qty<p.minQty)return'warning';return'ok';}
document.getElementById('appShell').innerHTML=`
  ${getSidebar('parts','../')}
  <main class="main-content">
    ${getTopbar('คลังอะไหล่','',`
      <div class="search-wrap" style="width:210px">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="4.5"/><line x1="9.7" y1="9.7" x2="13" y2="13"/></svg>
        <input type="text" id="partsSearch" placeholder="ค้นหาอะไหล่...">
      </div>
      <button class="btn-primary" onclick="document.getElementById('modalOverlay').classList.add('active')">+ เพิ่มอะไหล่</button>
    `)}
    <div class="content-area">
      <div class="sum3 fade-in">
        <div class="stat-card"><div class="stat-icon ic-orange"><svg width="20" height="20" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="8" width="12" height="8" rx="1"/><path d="M6 8V6a3 3 0 016 0v2"/></svg></div><div><div class="stat-label">อะไหล่ทั้งหมด</div><div class="stat-value" id="totalP">0</div></div></div>
        <div class="stat-card"><div class="stat-icon ic-red"><svg width="20" height="20" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2L17 16H1L9 2z"/><rect x="8.3" y="7" width="1.4" height="5" rx=".7"/><circle cx="9" cy="14" r=".8"/></svg></div><div><div class="stat-label">ใกล้หมด</div><div class="stat-value" id="lowP" style="color:var(--red)">0</div></div></div>
        <div class="stat-card"><div class="stat-icon ic-green"><svg width="20" height="20" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3,10 7,14 15,4"/></svg></div><div><div class="stat-label">ปกติ</div><div class="stat-value" id="okP" style="color:var(--green)">0</div></div></div>
      </div>
      <div id="alertParts" style="margin-bottom:12px"></div>
      <div class="parts-grid fade-in" id="partsGrid"></div>
    </div>
  </main>`;
function renderParts(data){
  document.getElementById('totalP').textContent=data.length;
  document.getElementById('lowP').textContent=data.filter(p=>getStatus(p)!=='ok').length;
  document.getElementById('okP').textContent=data.filter(p=>getStatus(p)==='ok').length;
  const critical=data.filter(p=>getStatus(p)!=='ok');
  document.getElementById('alertParts').innerHTML=critical.length?`<div class="alert-banner"><svg width="14" height="14" viewBox="0 0 14 14" fill="#991b1b"><path d="M7 1L13.9 13H0.1L7 1z"/><rect x="6.3" y="5" width="1.4" height="5" rx=".7"/><circle cx="7" cy="11.5" r=".8"/></svg><span>อะไหล่ใกล้หมด <strong>${critical.length} รายการ</strong>: ${critical.map(p=>p.name).join(', ')}</span></div>`:'';
  const tag={critical:'ใกล้หมด!',warning:'พอใช้',ok:'ปกติ'};
  document.getElementById('partsGrid').innerHTML=data.map(p=>{
    const st=getStatus(p);const pct=Math.min(Math.round((p.qty/(p.minQty*2))*100),100);
    return `<div class="part-card ${st}">
      <div class="pc-header"><div><div class="pc-name">${p.name}</div><div class="pc-cat">${p.category||'อะไหล่'}</div></div><span class="pc-badge ${st}">${tag[st]}</span></div>
      <div class="pc-qty"><span class="pc-qty-val">${p.qty}</span><span class="pc-qty-unit">${p.unit}</span><span class="pc-qty-min">ขั้นต่ำ: ${p.minQty}</span></div>
      <div class="pc-progress"><div class="pc-bar ${st}" style="width:${pct}%"></div></div>
      <div class="pc-footer">
        <button class="pc-btn pc-btn-primary" onclick="restock('${p._id}','${p.name}')">+ เติมสต็อก</button>
        <button class="pc-btn pc-btn-ghost">แก้ไข</button>
      </div>
    </div>`;}).join('');
}
function restock(id,name){const q=prompt(`เติมสต็อก "${name}" จำนวนเท่าไร?`,'10');if(!q||isNaN(q))return;const p=PARTS.find(x=>x._id===id);if(p){p.qty+=parseInt(q);renderParts(PARTS);}}
document.addEventListener('DOMContentLoaded',()=>{
  checkAuth('../');
  renderParts(PARTS);
  document.getElementById('partsSearch').addEventListener('input',e=>{const q=e.target.value.toLowerCase();renderParts(q?PARTS.filter(p=>p.name.toLowerCase().includes(q)):PARTS);});
});
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}
function submitPart(){
  const name=document.getElementById('p-name').value.trim();
  const qty=parseInt(document.getElementById('p-qty').value)||0;
  if(!name)return;
  PARTS.push({_id:Date.now().toString(),name,qty,minQty:parseInt(document.getElementById('p-min').value)||5,unit:document.getElementById('p-unit').value||'ชิ้น',category:document.getElementById('p-cat').value||'อื่นๆ',status:'ok'});
  renderParts(PARTS);closeModal();
}
</script>
</body>
</html>
