<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บัญชีรายรับ-รายจ่าย</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    .ledger-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .summary-card {
      background: #fff;
      border-radius: 8px;
      padding: 16px 20px;
      flex: 1;
      min-width: 140px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      text-align: center;
    }
    .summary-card .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .summary-card .value {
      font-size: 20px;
      font-weight: 700;
      color: #333;
    }
    .summary-card.income .value { color: #28a745; }
    .summary-card.deduction .value { color: #dc3545; }
    .summary-card.profit .value { color: #007bff; }
    .month-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 18px;
    }
    .month-tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #f8f9fa;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .month-tab.active {
      background: #007bff;
      color: #fff;
      border-color: #007bff;
    }
    .month-tab:hover:not(.active) {
      background: #e9ecef;
    }
    .add-entry-form {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .add-entry-form h5 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 15px;
      color: #333;
    }
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .form-group label {
      font-size: 12px;
      color: #666;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #007bff;
    }
    .btn-add {
      background: #28a745;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-add:hover { background: #218838; }
    .date-group {
      margin-bottom: 18px;
    }
    .date-group-header {
      background: #f0f4f8;
      padding: 8px 14px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
      color: #444;
    }
    .action-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      justify-content: flex-end;
    }
    .btn-export {
      background: #17a2b8;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-export:hover { background: #138496; }
    .btn-print {
      background: #6c757d;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-print:hover { background: #5a6268; }
    .btn-delete {
      background: none;
      border: none;
      color: #dc3545;
      cursor: pointer;
      font-size: 15px;
      padding: 2px 6px;
    }
    .btn-delete:hover { color: #a71d2a; }
    .empty-msg {
      text-align: center;
      color: #aaa;
      padding: 30px 0;
      font-size: 15px;
    }
    @media print {
      .no-print { display: none !important; }
      body { background: #fff; }
    }
  </style>
</head>
<body>
<div id="sidebar-container"></div>
<div class="main-content">
  <div id="topbar-container"></div>
  <div class="page-content">
    <div class="page-header">
      <h2>บัญชีรายรับ-รายจ่าย</h2>
    </div>

    <!-- Add Entry Form -->
    <div class="add-entry-form no-print">
      <h5>เพิ่มรายการใหม่</h5>
      <div class="form-row">
        <div class="form-group">
          <label>รายการ</label>
          <input type="text" id="field-item" placeholder="ชื่อรายการ" style="width:160px">
        </div>
        <div class="form-group">
          <label>จำนวนเงิน (บาท)</label>
          <input type="number" id="field-amount" placeholder="0" style="width:120px">
        </div>
        <div class="form-group">
          <label>ประเภทการชำระ</label>
          <select id="field-paytype" style="width:120px">
            <option value="cash">เงินสด</option>
            <option value="transfer">โอนเงิน</option>
          </select>
        </div>
        <div class="form-group">
          <label>วันที่</label>
          <input type="date" id="field-date" style="width:145px">
        </div>
        <div class="form-group">
          <label>หมายเหตุ</label>
          <input type="text" id="field-note" placeholder="(ไม่บังคับ)" style="width:150px">
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button class="btn-add" id="btn-add-entry">+ เพิ่มรายการ</button>
        </div>
      </div>
      <div id="form-error" style="color:#dc3545;font-size:13px;margin-top:8px;"></div>
    </div>

    <!-- Month Tabs -->
    <div class="month-tabs no-print" id="month-tabs"></div>

    <!-- Summary Bar -->
    <div class="ledger-summary" id="ledger-summary">
      <div class="summary-card income">
        <div class="label">รายรับรวม</div>
        <div class="value" id="sum-total">0</div>
      </div>
      <div class="summary-card">
        <div class="label">เงินสด</div>
        <div class="value" id="sum-cash">0</div>
      </div>
      <div class="summary-card">
        <div class="label">โอนเงิน</div>
        <div class="value" id="sum-transfer">0</div>
      </div>
      <div class="summary-card deduction">
        <div class="label">หักค่าใช้จ่าย (1,500/วัน)</div>
        <div class="value" id="sum-deduction">0</div>
      </div>
      <div class="summary-card profit">
        <div class="label">กำไรสุทธิ</div>
        <div class="value" id="sum-profit">0</div>
      </div>
    </div>

    <!-- Export Buttons -->
    <div class="action-bar no-print">
      <button class="btn-export" id="btn-export-excel">Export Excel</button>
      <button class="btn-print" id="btn-export-pdf">Export PDF</button>
    </div>

    <!-- Entries Table -->
    <div id="entries-container"></div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/shared.js"></script>
<script>
(function() {
  var MONTHS = [
    'มกราคม','กุมภาพันธ์','มีนาคม','เมษายน',
    'พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม',
    'กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'
  ];

  var allEntries = [];
  var currentYear = new Date().getFullYear();
  var currentMonth = new Date().getMonth(); // 0-indexed

  // Init page
  document.getElementById('sidebar-container').innerHTML = getSidebar('ledger', '../');
  document.getElementById('topbar-container').innerHTML = getTopbar();
  checkAuth('../');

  // Set default date to today
  var today = new Date();
  var mm = String(today.getMonth() + 1).padStart(2, '0');
  var dd = String(today.getDate()).padStart(2, '0');
  document.getElementById('field-date').value = today.getFullYear() + '-' + mm + '-' + dd;

  // Load all entries
  function loadEntries() {
    api.getLedgerAll().then(function(data) {
      allEntries = data || [];
      renderMonthTabs();
      renderCurrentMonth();
    }).catch(function(err) {
      console.error('Failed to load ledger:', err);
      allEntries = [];
      renderMonthTabs();
      renderCurrentMonth();
    });
  }

  // Filter entries for selected month
  function getMonthEntries(year, month) {
    return allEntries.filter(function(e) {
      var d = new Date(e.date);
      return d.getFullYear() === year && d.getMonth() === month;
    });
  }

  // Get distinct year-month combos from data
  function getAvailableMonths() {
    var seen = {};
    var result = [];
    allEntries.forEach(function(e) {
      var d = new Date(e.date);
      var key = d.getFullYear() + '-' + d.getMonth();
      if (!seen[key]) {
        seen[key] = true;
        result.push({ year: d.getFullYear(), month: d.getMonth() });
      }
    });
    // Always include current month
    var curKey = currentYear + '-' + currentMonth;
    if (!seen[curKey]) {
      result.push({ year: currentYear, month: currentMonth });
    }
    result.sort(function(a, b) {
      if (a.year !== b.year) return a.year - b.year;
      return a.month - b.month;
    });
    return result;
  }

  // Render month tabs
  function renderMonthTabs() {
    var months = getAvailableMonths();
    var container = document.getElementById('month-tabs');
    var html = '';
    months.forEach(function(m) {
      var isActive = (m.year === currentYear && m.month === currentMonth) ? ' active' : '';
      html += '<button class="month-tab' + isActive + '" data-year="' + m.year + '" data-month="' + m.month + '">';
      html += MONTHS[m.month] + ' ' + (m.year + 543);
      html += '</button>';
    });
    container.innerHTML = html;
    // Attach events
    var tabs = container.querySelectorAll('.month-tab');
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].addEventListener('click', function() {
        currentYear = parseInt(this.getAttribute('data-year'), 10);
        currentMonth = parseInt(this.getAttribute('data-month'), 10);
        renderMonthTabs();
        renderCurrentMonth();
      });
    }
  }

  // Calculate summary
  function calcSummary(entries) {
    var total = 0;
    var cash = 0;
    var transfer = 0;
    var days = {};
    entries.forEach(function(e) {
      var amt = parseFloat(e.amount) || 0;
      total += amt;
      if (e.payType === 'cash') {
        cash += amt;
      } else {
        transfer += amt;
      }
      var dateKey = e.date ? e.date.substring(0, 10) : 'unknown';
      days[dateKey] = true;
    });
    var numDays = Object.keys(days).length;
    var deduction = numDays * 1500;
    var profit = total - deduction;
    return { total: total, cash: cash, transfer: transfer, deduction: deduction, profit: profit };
  }

  function formatNumber(n) {
    return n.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // Render current month
  function renderCurrentMonth() {
    var entries = getMonthEntries(currentYear, currentMonth);
    var summary = calcSummary(entries);

    document.getElementById('sum-total').textContent = formatNumber(summary.total);
    document.getElementById('sum-cash').textContent = formatNumber(summary.cash);
    document.getElementById('sum-transfer').textContent = formatNumber(summary.transfer);
    document.getElementById('sum-deduction').textContent = formatNumber(summary.deduction);
    document.getElementById('sum-profit').textContent = formatNumber(summary.profit);

    // Group by date
    var groups = {};
    entries.forEach(function(e) {
      var dateKey = e.date ? e.date.substring(0, 10) : 'unknown';
      if (!groups[dateKey]) { groups[dateKey] = []; }
      groups[dateKey].push(e);
    });

    var sortedDates = Object.keys(groups).sort();
    var container = document.getElementById('entries-container');

    if (sortedDates.length === 0) {
      container.innerHTML = '<div class="empty-msg">ไม่มีรายการในเดือนนี้</div>';
      return;
    }

    var html = '<table class="ledger-table" id="ledger-print-table"><thead><tr>';
    html += '<th>วันที่</th><th>รายการ</th><th>จำนวนเงิน</th><th>ประเภท</th><th>หมายเหตุ</th><th class="no-print">ลบ</th>';
    html += '</tr></thead><tbody>';

    sortedDates.forEach(function(dateKey) {
      var dayEntries = groups[dateKey];
      var d = new Date(dateKey);
      var thaiDate = d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + (d.getFullYear() + 543);
      var isFirst = true;
      dayEntries.forEach(function(e) {
        html += '<tr>';
        if (isFirst) {
          html += '<td rowspan="' + dayEntries.length + '" style="font-weight:600;vertical-align:middle">' + thaiDate + '</td>';
          isFirst = false;
        }
        var payLabel = (e.payType === 'cash') ? 'เงินสด' : 'โอนเงิน';
        var badgeClass = (e.payType === 'cash') ? 'badge badge-success' : 'badge badge-info';
        var amt = parseFloat(e.amount) || 0;
        html += '<td>' + (e.item || '') + '</td>';
        html += '<td style="text-align:right">' + formatNumber(amt) + '</td>';
        html += '<td><span class="' + badgeClass + '">' + payLabel + '</span></td>';
        html += '<td>' + (e.note || '') + '</td>';
        html += '<td class="no-print"><button class="btn-delete" data-id="' + e.id + '" title="ลบรายการ">&#10005;</button></td>';
        html += '</tr>';
      });
    });

    html += '</tbody></table>';
    container.innerHTML = html;

    // Event delegation for delete
    container.addEventListener('click', function(evt) {
      var btn = evt.target.closest('.btn-delete');
      if (!btn) return;
      var entryId = btn.getAttribute('data-id');
      if (!entryId) return;
      if (!confirm('ยืนยันการลบรายการนี้?')) return;
      api.deleteLedgerEntry(entryId).then(function() {
        loadEntries();
      }).catch(function(err) {
        alert('ลบไม่สำเร็จ: ' + (err.message || err));
      });
    });
  }

  // Add entry
  document.getElementById('btn-add-entry').addEventListener('click', function() {
    var item = document.getElementById('field-item').value.trim();
    var amountStr = document.getElementById('field-amount').value.trim();
    var payType = document.getElementById('field-paytype').value;
    var date = document.getElementById('field-date').value;
    var note = document.getElementById('field-note').value.trim();
    var errorEl = document.getElementById('form-error');

    errorEl.textContent = '';
    if (!item) { errorEl.textContent = 'กรุณากรอกชื่อรายการ'; return; }
    if (!amountStr || isNaN(parseFloat(amountStr))) { errorEl.textContent = 'กรุณากรอกจำนวนเงินที่ถูกต้อง'; return; }
    if (!date) { errorEl.textContent = 'กรุณาเลือกวันที่'; return; }

    var payload = { item: item, amount: parseFloat(amountStr), payType: payType, date: date, note: note };
    api.createLedgerEntry(payload).then(function() {
      document.getElementById('field-item').value = '';
      document.getElementById('field-amount').value = '';
      document.getElementById('field-note').value = '';
      var d = new Date(date);
      currentYear = d.getFullYear();
      currentMonth = d.getMonth();
      loadEntries();
    }).catch(function(err) {
      errorEl.textContent = 'เพิ่มรายการไม่สำเร็จ: ' + (err.message || err);
    });
  });

  // Export Excel
  document.getElementById('btn-export-excel').addEventListener('click', function() {
    var entries = getMonthEntries(currentYear, currentMonth);
    if (entries.length === 0) { alert('ไม่มีรายการในเดือนนี้'); return; }
    var rows = [['วันที่', 'รายการ', 'จำนวนเงิน', 'ประเภท', 'หมายเหตุ']];
    entries.forEach(function(e) {
      var d = new Date(e.date);
      var thaiDate = d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + (d.getFullYear() + 543);
      rows.push([thaiDate, e.item || '', parseFloat(e.amount) || 0, e.payType === 'cash' ? 'เงินสด' : 'โอนเงิน', e.note || '']);
    });
    var summary = calcSummary(entries);
    rows.push([]);
    rows.push(['รายรับรวม', summary.total, '', 'เงินสด', summary.cash]);
    rows.push(['โอนเงิน', summary.transfer, '', 'หักค่าใช้จ่าย', summary.deduction]);
    rows.push(['กำไรสุทธิ', summary.profit]);
    var ws = XLSX.utils.aoa_to_sheet(rows);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Ledger');
    var fileName = 'ledger-' + (currentYear + 543) + '-' + MONTHS[currentMonth] + '.xlsx';
    XLSX.writeFile(wb, fileName);
  });

  // Export PDF
  document.getElementById('btn-export-pdf').addEventListener('click', function() {
    window.print();
  });

  // Start
  loadEntries();
})();
</script>
</body>
</html>
